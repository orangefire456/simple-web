<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ Restaurant Management System</h1>
            <nav class="nav-menu">
                <button class="nav-btn active" data-tab="menu">Menu</button>
                <button class="nav-btn" data-tab="orders">Orders</button>
                <button class="nav-btn" data-tab="staff">Staff</button>
            </nav>
        </header>

        <!-- Menu Tab -->
        <section id="menu" class="tab-content active">
            <h2>Menu Management</h2>
            <div class="form-section">
                <h3>Add New Item</h3>
                <form id="menuForm">
                    <input type="text" id="itemName" placeholder="Item Name" required>
                    <textarea id="itemDescription" placeholder="Description"></textarea>
                    <input type="number" id="itemPrice" placeholder="Price" step="0.01" required>
                    <select id="itemCategory" required>
                        <option value="">Select Category</option>
                        <option value="appetizer">Appetizer</option>
                        <option value="main">Main Course</option>
                        <option value="dessert">Dessert</option>
                        <option value="beverage">Beverage</option>
                    </select>
                    <button type="submit" class="btn-primary">Add Item</button>
                </form>
            </div>

            <div class="items-section">
                <h3>Current Menu</h3>
                <div id="menuItems" class="items-grid"></div>
            </div>
        </section>

        <!-- Orders Tab -->
        <section id="orders" class="tab-content">
            <h2>Order Management</h2>
            <div class="form-section">
                <h3>Create New Order</h3>
                <form id="orderForm">
                    <input type="text" id="customerName" placeholder="Customer Name" required>
                    <div id="orderItemsSelect" class="order-items"></div>
                    <button type="submit" class="btn-primary">Create Order</button>
                </form>
            </div>

            <div class="orders-section">
                <h3>Active Orders</h3>
                <div id="ordersList" class="orders-list"></div>
            </div>
        </section>

        <!-- Staff Tab -->
        <section id="staff" class="tab-content">
            <h2>Staff Management</h2>
            <div class="form-section">
                <h3>Add New Staff Member</h3>
                <form id="staffForm">
                    <input type="text" id="staffName" placeholder="Full Name" required>
                    <select id="staffPosition" required>
                        <option value="">Select Position</option>
                        <option value="manager">Manager</option>
                        <option value="chef">Chef</option>
                        <option value="waiter">Waiter</option>
                        <option value="cashier">Cashier</option>
                    </select>
                    <input type="email" id="staffEmail" placeholder="Email" required>
                    <input type="tel" id="staffPhone" placeholder="Phone Number">
                    <button type="submit" class="btn-primary">Add Staff</button>
                </form>
            </div>

            <div class="staff-section">
                <h3>Staff Directory</h3>
                <div id="staffList" class="staff-list"></div>
            </div>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
